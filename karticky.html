<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Med&#x17E;uslovjanske karti&#x010D;ky</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --accent: #3a7bd5;
      --muted: #8892a4;
      --radius: 24px;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 24px;
      gap: 24px;
    }

    header { text-align: center; }
    header h1 {
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .lang-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .lang-btn {
      background: rgba(255,255,255,0.06);
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 1.45rem;
      line-height: 1;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .lang-btn span.code {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.12); }
    .lang-btn:active { transform: scale(0.93); }
    .lang-btn.active {
      border-color: var(--accent);
      background: rgba(58,123,213,0.15);
    }
    .lang-btn.active span.code { color: var(--accent); }

    .progress-bar {
      width: min(420px, 100%);
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .scene {
      width: min(420px, 100%);
      height: 240px;
      perspective: 1000px;
      cursor: pointer;
    }
    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
      border-radius: var(--radius);
    }
    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      padding: 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      user-select: none;
    }

    .label {
      position: absolute;
      top: 20px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .word {
      font-size: clamp(1.4rem, 5vw, 2.3rem);
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .word sup {
      font-size: 0.55em;
      vertical-align: super;
    }
    .word-sub {
      font-size: 0.48em;
      font-weight: 400;
      opacity: 0.65;
      line-height: 1.3;
    }

    .card-front { background: #eef4fb; color: #1a1a2e; }
    .card-front .label { color: var(--accent); }

    .card-back {
      background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
      color: #e8f4f8;
      transform: rotateY(180deg);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .card-back .label { color: #7ecfea; }

    .tap-hint {
      position: absolute;
      bottom: 22px;
      right: 28px;
      font-size: 2rem;
      pointer-events: none;
      opacity: 0;
      transform: rotate(180deg);
      transition: opacity 0.4s ease;
    }
    .tap-hint.visible {
      opacity: 1;
      animation: tapGesture 1.1s ease-in-out infinite;
    }
    @keyframes tapGesture {
      0%   { transform: rotate(180deg) translateY(0)    scale(1);    }
      35%  { transform: rotate(180deg) translateY(6px)  scale(0.88); }
      55%  { transform: rotate(180deg) translateY(6px)  scale(0.88); }
      80%  { transform: rotate(180deg) translateY(0)    scale(1);    }
      100% { transform: rotate(180deg) translateY(0)    scale(1);    }
    }

    .controls { display: flex; gap: 14px; align-items: center; justify-content: center; }
    .controls button {
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      border-radius: 999px;
      padding: 12px 22px;
      transition: transform 0.13s, box-shadow 0.13s, background 0.13s, opacity 0.13s;
    }
    .controls button:active { transform: scale(0.95); }

    button.btn-back {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.45);
    }
    button.btn-back:hover { background: rgba(255,255,255,0.16); }

    button.btn-no {
      background: rgba(220,80,80,0.25);
      color: rgba(255,160,160,0.9);
    }
    button.btn-no:hover:not(:disabled) { background: rgba(220,80,80,0.38); }
    button.btn-no:disabled {
      opacity: 0.3;
      cursor: default;
    }

    button.btn-yes {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 20px rgba(58,123,213,0.4);
    }
    button.btn-yes:hover { box-shadow: 0 6px 28px rgba(58,123,213,0.6); }

    .stats { color: var(--muted); font-size: 0.8rem; }

    /* Mode dropdown */
    .mode-dropdown {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 100;
    }
    .mode-toggle-btn {
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .mode-toggle-btn:hover { background: rgba(255,255,255,0.14); }
    .mode-menu {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: #16213e;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      overflow: hidden;
      min-width: 120px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .mode-menu.hidden { display: none; }
    .mode-menu-item {
      display: block;
      width: 100%;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.7);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 10px 16px;
      cursor: pointer;
      text-align: left;
      transition: background 0.12s;
    }
    .mode-menu-item:hover { background: rgba(255,255,255,0.08); }
    .mode-menu-item.active { color: var(--accent); }

    /* Section visibility */
    .game-section { display: contents; }
    .game-section.hidden { display: none; }

    /* Knopky section */
    .knopky-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(420px, 100%);
    }
    .knopky-section { perspective: 1000px; }
    .knopky-flip {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .knopky-word {
      background: #eef4fb;
      border-radius: 16px;
      padding: 8px 24px;
      width: 100%;
      height: 128px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      color: #1a1a2e;
    }
    .knopky-word .label {
      position: static;
      display: block;
      color: var(--accent);
      align-self: start;
      padding-top: 4px;
    }
    .knopky-main {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .knopky-main sup { font-size: 0.55em; vertical-align: super; }
    .knopky-sub {
      align-self: end;
      padding-bottom: 6px;
      font-size: 0.75rem;
      font-weight: 400;
      opacity: 0.65;
      line-height: 1.3;
      min-height: 1.2em;
    }
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }
    .option-btn {
      border: 2px solid transparent;
      border-radius: 16px;
      padding: 6px 10px;
      height: 72px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: clamp(0.8rem, 2.5vw, 0.95rem);
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 3px 12px rgba(58,123,213,0.35);
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      line-height: 1.3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .option-btn:hover:not([disabled]) { box-shadow: 0 4px 18px rgba(58,123,213,0.55); }
    .option-btn.correct {
      background: rgba(50,200,100,0.18);
      border-color: #32c864;
      color: #6effa0;
    }
    .option-btn.wrong {
      background: rgba(220,60,60,0.18);
      border-color: #dc3c3c;
      color: rgba(255,120,120,0.8);
      text-decoration: line-through;
    }
    .option-btn .word-sub {
      font-size: 0.72em;
      font-weight: 400;
      opacity: 0.8;
    }

    /* Vpisyvanje section */
    .vpisyvanje-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(420px, 100%);
      perspective: 1000px;
    }
    .vpisyvanje-flip {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .vpisyvanje-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-family: inherit;
      font-size: max(1.1rem, 16px);
      font-weight: 600;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      box-sizing: border-box;
    }
    .vpisyvanje-input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.12);
    }
    .vpisyvanje-input.correct {
      border-color: #32c864;
      background: rgba(50,200,100,0.12);
      color: #6effa0;
    }
    .vpisyvanje-input.wrong {
      border-color: #dc3c3c;
      background: rgba(220,60,60,0.12);
      color: rgba(255,120,120,0.9);
    }
    .vpisyvanje-answer {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
      color: #6effa0;
      min-height: 1.4em;
    }
    .vpisyvanje-answer.as-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 2px solid #32c864;
      background: rgba(50,200,100,0.12);
      color: #6effa0;
      font-size: max(1.1rem, 16px);
      font-weight: 600;
      box-sizing: border-box;
      min-height: unset;
    }
    .vpisyvanje-answer .word-sub {
      font-size: 0.8em;
      font-weight: 400;
      opacity: 0.8;
    }
    .vpisyvanje-answer sup { font-size: 0.6em; vertical-align: super; }
    .vpisyvanje-answer b { font-weight: 800; }
    .vpisyvanje-answer u { text-decoration-thickness: 2px; text-underline-offset: 3px; }
  </style>
</head>
<body>

<header>
  <h1>Med&#x17E;uslovjanske karti&#x010D;ky</h1>
</header>

<div class="mode-dropdown" id="modeDropdown">
  <button class="mode-toggle-btn" id="modeToggle">Karti&#x010D;ky &#x25BE;</button>
  <div class="mode-menu hidden" id="modeMenu">
    <button class="mode-menu-item active" data-mode="karticky">Karti&#x010D;ky</button>
    <button class="mode-menu-item"        data-mode="knopky">Knopky</button>
    <button class="mode-menu-item"        data-mode="vpisyvanje">Vpisyvanje</button>
  </div>
</div>

<div class="lang-selector" id="langSelector"></div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="game-section" id="kartickySect">
  <div class="scene">
    <div class="card" id="card">
      <div class="card-face card-front">
        <span class="label" id="frontLabel"></span>
        <span class="word" id="wordFront"></span>
        <span class="tap-hint" id="tapHint">&#x1F447;</span>
      </div>
      <div class="card-face card-back">
        <span class="label">Med&#x17E;uslovjansky</span>
        <span class="word" id="wordIsv"></span>
      </div>
    </div>
  </div>
  <div class="controls">
    <button class="btn-back" id="btnBack">&#x2190; Vrati</button>
    <button class="btn-no"   id="btnNo"   disabled>Ne znam &#x2192;</button>
    <button class="btn-yes"  id="btnYes">Znam &#x2192;</button>
  </div>
</div>

<div class="game-section hidden knopky-section" id="knopkySect">
  <div class="knopky-flip" id="knopkyFlip">
    <div class="knopky-word" id="knopkyWord">
      <span class="label" id="knopkyLabel"></span>
      <div class="knopky-main" id="knopkyWordMain"></div>
      <div class="knopky-sub"  id="knopkyWordSub"></div>
    </div>
    <div class="options-grid" id="optionsGrid"></div>
  </div>
</div>

<div class="game-section hidden vpisyvanje-section" id="vpisyvanjeSect">
  <div class="vpisyvanje-flip" id="vpisyvanjeFlip">
    <div class="knopky-word" id="vpisyvanjeWord">
      <span class="label" id="vpisyvanjeLabel"></span>
      <div class="knopky-main" id="vpisyvanjeWordMain"></div>
      <div class="knopky-sub"  id="vpisyvanjeWordSub"></div>
    </div>
    <input type="text" class="vpisyvanje-input" id="vpisyvanjeInput" autocomplete="off" autocorrect="off" spellcheck="false" />
    <div class="vpisyvanje-answer" id="vpisyvanjeAnswer"></div>
    <div class="controls">
      <button class="btn-back" id="vpisyvanjeBtnBack">&#x2190; Vrati</button>
      <button class="btn-yes"  id="vpisyvanjeBtnCheck">Prověri &#x2192;</button>
    </div>
  </div>
</div>

<div class="stats" id="stats"></div>

<script src="vocab.js"></script>
<script src="categories.js"></script>
<script>


const LANGS = [
  { code: 'pl', flag: '\uD83C\uDDF5\uD83C\uDDF1', label: 'Polski' },
  { code: 'cz', flag: '\uD83C\uDDE8\uD83C\uDDFF', label: '\u010Cesky' },
  { code: 'sk', flag: '\uD83C\uDDF8\uD83C\uDDF0', label: 'Slovensky' },
  { code: 'uk', flag: '\uD83C\uDDFA\uD83C\uDDE6', label: '\u0423\u043A\u0440\u0430\u0457\u043D\u0441\u044C\u043A\u0430' },
  { code: 'ru', flag: '\uD83C\uDDF7\uD83C\uDDFA', label: '\u0420\u0443\u0441\u0441\u043A\u0438\u0439' },
  { code: 'cr', flag: '\uD83C\uDDED\uD83C\uDDF7', label: 'Hrvatski' },
  { code: 'en', flag: '\uD83C\uDDEC\uD83C\uDDE7', label: 'English' },
  { code: 'de', flag: '\uD83C\uDDE9\uD83C\uDDEA', label: 'Deutsch' },
  { code: 'es', flag: '\uD83C\uDDEA\uD83C\uDDF8', label: 'Espa\u00F1ol' },
  { code: 'it', flag: '\uD83C\uDDEE\uD83C\uDDF9', label: 'Italiano' }
];

var currentLang = 'en';

function catLabel(cat) {
  return (CATS[cat] && CATS[cat][currentLang]) || cat || '';
}
var currentMode = 'karticky';
var deck = [];
var index = 0;
var flipped = false;

var card          = document.getElementById('card');
var wordFront     = document.getElementById('wordFront');
var wordIsv       = document.getElementById('wordIsv');
var frontLabel    = document.getElementById('frontLabel');
var btnBack       = document.getElementById('btnBack');
var btnNo         = document.getElementById('btnNo');
var btnYes        = document.getElementById('btnYes');
var checkedCount  = 0;
var repeatQueue   = [];
var stats         = document.getElementById('stats');
var progFill      = document.getElementById('progressFill');
var tapHint       = document.getElementById('tapHint');
var selector      = document.getElementById('langSelector');
var hintTimer     = null;
var flipCount     = 0;
var kartickySect  = document.getElementById('kartickySect');
var knopkySect    = document.getElementById('knopkySect');
var knopkyLabel   = document.getElementById('knopkyLabel');
var knopkyWordMain = document.getElementById('knopkyWordMain');
var knopkyWordSub  = document.getElementById('knopkyWordSub');
var optionsGrid   = document.getElementById('optionsGrid');
var knopkyNextAction = null;
var knopkyOptions    = null;
var knopkyAnswered   = false;
var knopkyAutoTimer  = null;
var knopkyGeneration = 0;

var knopkyFlip       = document.getElementById('knopkyFlip');

var vpisyvanjeSect      = document.getElementById('vpisyvanjeSect');
var vpisyvanjeFlip      = document.getElementById('vpisyvanjeFlip');
var vpisyvanjeLabel     = document.getElementById('vpisyvanjeLabel');
var vpisyvanjeWordMain  = document.getElementById('vpisyvanjeWordMain');
var vpisyvanjeWordSub   = document.getElementById('vpisyvanjeWordSub');
var vpisyvanjeInput     = document.getElementById('vpisyvanjeInput');
var vpisyvanjeAnswer    = document.getElementById('vpisyvanjeAnswer');
var vpisyvanjeBtnBack   = document.getElementById('vpisyvanjeBtnBack');
var vpisyvanjeBtnCheck  = document.getElementById('vpisyvanjeBtnCheck');

var vpisyvanjeAnswered    = false;
var vpisyvanjeNextAction  = null;
var vpisyvanjeCurrentNum  = null;

var modeToggle = document.getElementById('modeToggle');
var modeMenu   = document.getElementById('modeMenu');

LANGS.forEach(function(lang) {
  var btn = document.createElement('button');
  btn.className = 'lang-btn' + (lang.code === currentLang ? ' active' : '');
  btn.dataset.code = lang.code;
  btn.title = lang.label;
  btn.innerHTML = '<span class="flag">' + lang.flag + '</span><span class="code">' + lang.code.toUpperCase() + '</span>';
  btn.addEventListener('click', function() { setLang(lang.code); });
  selector.appendChild(btn);
});

modeToggle.addEventListener('click', function(e) {
  e.stopPropagation();
  modeMenu.classList.toggle('hidden');
});

document.addEventListener('click', function() { modeMenu.classList.add('hidden'); });

document.querySelectorAll('.mode-menu-item').forEach(function(btn) {
  btn.addEventListener('click', function() { switchMode(btn.dataset.mode); });
});

function switchMode(mode) {
  currentMode = mode;
  localStorage.setItem('karticky_mode', mode);
  var labels = { karticky: 'Karti\u010Dky', knopky: 'Knopky', vpisyvanje: 'Vpisyvanje' };
  modeToggle.textContent = labels[mode] + ' \u25BE';
  document.querySelectorAll('.mode-menu-item').forEach(function(b) {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  kartickySect.classList.toggle('hidden',    mode !== 'karticky');
  knopkySect.classList.toggle('hidden',      mode !== 'knopky');
  vpisyvanjeSect.classList.toggle('hidden',  mode !== 'vpisyvanje');
  showCurrent();
}

function formatWord(html) {
  var idx = html.indexOf('(');
  if (idx <= 0) return '<span>' + html + '</span>';
  var main = html.substring(0, idx).trim();
  var sub  = html.substring(idx);
  return '<span>' + main + '</span><span class="word-sub">' + sub + '</span>';
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function setLang(code) {
  var currentItem = deck[index] || null;
  currentLang = code;
  localStorage.setItem('karticky_lang', code);
  selector.querySelectorAll('.lang-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.code === code);
  });
  var lang = LANGS.find(function(l) { return l.code === code; });
  deck = shuffle(VOCAB.filter(function(w) { return w[code] && w[code].trim() !== ''; }));
  var found = currentItem ? deck.indexOf(currentItem) : -1;
  if (found >= 0) { index = found; }
  else { index = 0; knopkyOptions = null; }
  showCurrent();
}

function scheduleHint() {
  clearTimeout(hintTimer);
  tapHint.classList.remove('visible');
  if (currentMode === 'karticky' && !flipped && flipCount < 3) {
    hintTimer = setTimeout(function() { tapHint.classList.add('visible'); }, 5000);
  }
}

function showCard() {
  if (deck.length === 0) {
    wordFront.innerHTML = '(no data)';
    wordIsv.innerHTML = '';
    stats.textContent = '';
    progFill.style.width = Math.min(checkedCount / 50 * 100, 100).toFixed(1) + '%';
    return;
  }
  var item = deck[index];
  frontLabel.textContent = catLabel(item.cat);
  wordFront.innerHTML = formatWord(item[currentLang]);
  wordIsv.innerHTML   = formatWord(item.isv);
  card.style.transition = 'none';
  card.classList.remove('flipped');
  flipped = false;
  btnNo.disabled = true;
  void card.offsetWidth;
  card.style.transition = '';
  stats.textContent    = '#' + item.num;
  progFill.style.width = Math.min(checkedCount / 50 * 100, 100).toFixed(1) + '%';
  scheduleHint();
}

function showKnopky() {
  if (deck.length === 0) return;
  var item = deck[index];
  knopkyLabel.textContent = catLabel(item.cat);
  var langWord = item[currentLang] || '';
  var parenIdx = langWord.indexOf('(');
  if (parenIdx <= 0) {
    knopkyWordMain.innerHTML = langWord;
    knopkyWordSub.innerHTML  = '';
  } else {
    knopkyWordMain.innerHTML = langWord.substring(0, parenIdx).trim();
    knopkyWordSub.innerHTML  = langWord.substring(parenIdx);
  }

  // If already answered, just update the label/word and leave highlights intact
  if (knopkyAnswered) return;

  knopkyNextAction = null;
  clearTimeout(knopkyAutoTimer);
  knopkyGeneration++;

  // Generate options only when word changes (knopkyOptions === null)
  if (!knopkyOptions) {
    var correct = item.isv;
    var pool = shuffle(VOCAB.filter(function(w) { return w.isv && w.isv !== correct; }));
    var wrongs = pool.slice(0, 3).map(function(w) { return w.isv; });
    knopkyOptions = shuffle([correct].concat(wrongs));
  }

  var correct = item.isv;
  optionsGrid.innerHTML = '';
  knopkyOptions.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = formatWord(opt);
    if (opt === correct) btn.dataset.correct = 'true';
    btn.addEventListener('click', function() { handleOptionClick(btn, opt === correct); });
    optionsGrid.appendChild(btn);
  });

  stats.textContent    = '#' + item.num;
  progFill.style.width = Math.min(checkedCount / 50 * 100, 100).toFixed(1) + '%';
}

function handleOptionClick(clickedBtn, isCorrect) {
  if (knopkyAnswered) return;
  knopkyAnswered = true;

  var myGen = knopkyGeneration;

  var allBtns = optionsGrid.querySelectorAll('.option-btn');
  allBtns.forEach(function(b) { b.disabled = true; });

  if (isCorrect) {
    clickedBtn.classList.add('correct');
    knopkyNextAction = function() { nextCard(); };
  } else {
    clickedBtn.classList.add('wrong');
    allBtns.forEach(function(b) {
      if (b.dataset.correct === 'true') b.classList.add('correct');
    });
    knopkyNextAction = function() {
      repeatQueue.push({ item: deck[index], remaining: 5 });
      nextCard();
    };
  }

  function advance() {
    if (knopkyGeneration !== myGen) return;
    clearTimeout(knopkyAutoTimer);
    if (knopkyNextAction) { var fn = knopkyNextAction; knopkyNextAction = null; fn(); }
  }

  setTimeout(function() {
    allBtns.forEach(function(b) {
      if (b.dataset.correct === 'true') {
        b.disabled = false;
        b.addEventListener('click', advance, { once: true });
      }
    });
    document.addEventListener('click', function handler(e) {
      document.removeEventListener('click', handler);
      if (currentMode !== 'knopky') return;
      if (e.target.closest('.lang-selector, .mode-dropdown')) return;
      advance();
    });
  }, 400);
}

var FLIP_MS = 260;

function flipThen(el, fn) {
  el.style.transition = 'transform ' + FLIP_MS + 'ms cubic-bezier(0.4,0.2,0.2,1)';
  el.style.transform  = 'rotateY(90deg)';
  setTimeout(function() {
    fn();
    el.style.transition = 'none';
    el.style.transform  = 'rotateY(-90deg)';
    el.getBoundingClientRect(); // force reflow
    el.style.transition = 'transform ' + FLIP_MS + 'ms cubic-bezier(0.4,0.2,0.2,1)';
    el.style.transform  = 'rotateY(0deg)';
    setTimeout(function() { el.style.transition = el.style.transform = ''; }, FLIP_MS);
  }, FLIP_MS);
}

function normalize(s) {
  return s.replace(/<sup>[^<]*<\/sup>/gi, '')  // remove superscripts (incl. content)
           .replace(/<[^>]*>/g, '')              // strip remaining HTML tags
           .replace(/[\s,.!?;:()\[\]{}]/g, '')  // strip punctuation/spaces/brackets
           .toLowerCase()
           .replace(/cz/g, 'č')                 // allow cz as substitute for č
           .replace(/sz/g, 'š')                 // allow sz as substitute for š
           .replace(/ĉ/g, 'č')                  // allow ĉ as substitute for č
           .replace(/ć/g, 'č')                  // allow ć as substitute for č
           .replace(/[êèé]/g, 'ě')              // allow ê/è/é as substitute for ě
           .replace(/ŝ/g, 'š')                  // allow ŝ as substitute for š
           .replace(/ś/g, 'š');                 // allow ś as substitute for š
}

// Split on ',' and '? ' only at top level (not inside parentheses)
function splitTopLevel(s) {
  var parts = [], depth = 0, start = 0;
  for (var i = 0; i < s.length; i++) {
    if (s[i] === '(') depth++;
    else if (s[i] === ')') depth--;
    else if (depth === 0) {
      if (s[i] === ',') { parts.push(s.substring(start, i)); start = i + 1; }
      else if (s[i] === '?' && i + 1 < s.length && s[i + 1] === ' ') {
        parts.push(s.substring(start, i + 1)); start = i + 2; i++;
      }
    }
  }
  parts.push(s.substring(start));
  return parts;
}

// Expand attached parens into two variants: "(po)zvoniti" → ["pozvoniti","zvoniti"]
function expandOptionalParens(s) {
  for (var i = 0; i < s.length; i++) {
    if (s[i] === '(' && (i === 0 || s[i - 1] !== ' ')) {
      var close = s.indexOf(')', i);
      if (close < 0) break;
      var before = s.substring(0, i);
      var inside = s.substring(i + 1, close);
      var after  = s.substring(close + 1);
      var result = [];
      expandOptionalParens(before + inside + after).forEach(function(v) { result.push(v); });
      expandOptionalParens(before + after).forEach(function(v) { if (result.indexOf(v) < 0) result.push(v); });
      return result;
    }
  }
  return [s];
}

function showVpisyvanje() {
  if (deck.length === 0) return;
  var item = deck[index];
  vpisyvanjeLabel.textContent = catLabel(item.cat);
  var langWord = item[currentLang] || '';
  var parenIdx = langWord.indexOf('(');
  if (parenIdx <= 0) {
    vpisyvanjeWordMain.innerHTML = langWord;
    vpisyvanjeWordSub.innerHTML  = '';
  } else {
    vpisyvanjeWordMain.innerHTML = langWord.substring(0, parenIdx).trim();
    vpisyvanjeWordSub.innerHTML  = langWord.substring(parenIdx);
  }
  if (vpisyvanjeAnswered) return;
  var isNewWord = (item.num !== vpisyvanjeCurrentNum);
  vpisyvanjeCurrentNum = item.num;
  if (isNewWord) {
    vpisyvanjeInput.value = '';
    vpisyvanjeInput.disabled = false;
    vpisyvanjeInput.className = 'vpisyvanje-input';
    vpisyvanjeInput.style.display = '';
    vpisyvanjeAnswer.textContent = '';
    vpisyvanjeAnswer.classList.remove('as-input');
    vpisyvanjeBtnCheck.textContent = 'Prověri \u2192';
    vpisyvanjeBtnCheck.style.cssText = '';
    stats.textContent    = '#' + item.num;
    progFill.style.width = Math.min(checkedCount / 50 * 100, 100).toFixed(1) + '%';
  }
  vpisyvanjeInput.focus();
}

function checkVpisyvanje() {
  if (vpisyvanjeAnswered) {
    if (vpisyvanjeNextAction) { var fn = vpisyvanjeNextAction; vpisyvanjeNextAction = null; fn(); }
    return;
  }
  var item = deck[index];
  var isvClean = item.isv
    .replace(/<sup>[^<]*<\/sup>/gi, '').replace(/<[^>]*>/g, '')
    .replace(/\s+\([^)]*\)/g, '');  // strip explanatory parens (space-separated)
  var userNorm = normalize(vpisyvanjeInput.value);
  var matchedIdx = -1;
  isvClean.split(/,|\?\s+/).some(function(v, i) {
    if (expandOptionalParens(v.trim()).some(function(exp) { return normalize(exp) === userNorm; })) {
      matchedIdx = i;
      return true;
    }
  });
  var isCorrect = matchedIdx >= 0;
  vpisyvanjeAnswered = true;
  vpisyvanjeInput.disabled = true;
  if (isCorrect) {
    vpisyvanjeInput.style.display = 'none';
    vpisyvanjeAnswer.classList.add('as-input');
    var rawVariants = splitTopLevel(item.isv);
    vpisyvanjeAnswer.innerHTML = '<span>' + rawVariants.map(function(v, i) {
      var t = v.trim();
      if (i !== matchedIdx) return t;
      var sp = t.indexOf(' (');
      return sp >= 0 ? '<b>' + t.substring(0, sp) + '</b>' + t.substring(sp) : '<b>' + t + '</b>';
    }).join(', ') + '</span>';
    vpisyvanjeBtnCheck.textContent = 'Znam \u2192';
    vpisyvanjeBtnCheck.style.background = 'rgba(50,200,100,0.3)';
    vpisyvanjeBtnCheck.style.boxShadow  = 'none';
    vpisyvanjeNextAction = function() { nextCard(); };
  } else {
    vpisyvanjeInput.classList.add('wrong');
    vpisyvanjeBtnCheck.textContent = 'Ne znam \u2192';
    vpisyvanjeBtnCheck.style.background = 'rgba(220,80,80,0.25)';
    vpisyvanjeBtnCheck.style.color      = 'rgba(255,160,160,0.9)';
    vpisyvanjeBtnCheck.style.boxShadow  = 'none';
    vpisyvanjeAnswer.innerHTML = formatWord(item.isv);
    vpisyvanjeNextAction = function() {
      repeatQueue.push({ item: deck[index], remaining: 5 });
      nextCard();
    };
  }
}

function showCurrent() {
  if (currentMode === 'karticky')   showCard();
  else if (currentMode === 'knopky') showKnopky();
  else                               showVpisyvanje();
}

function flipCard() {
  clearTimeout(hintTimer);
  tapHint.classList.remove('visible');
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
  if (flipped) { flipCount++; btnNo.disabled = false; }
}

function nextCard() {
  if (deck.length === 0) return;
  checkedCount++;
  index = (index + 1) % deck.length;
  if (index === 0) deck = shuffle(VOCAB.filter(function(w) { return w[currentLang] && w[currentLang].trim() !== ''; }));
  // Decrement repeat countdowns and inject any due items right after current position
  var due = [];
  repeatQueue = repeatQueue.filter(function(r) {
    r.remaining--;
    if (r.remaining <= 0) { due.push(r.item); return false; }
    return true;
  });
  due.forEach(function(item, i) {
    deck.splice(index + 1 + i, 0, item);
  });
  knopkyOptions = null;
  knopkyAnswered = false;
  vpisyvanjeAnswered = false;
  if (currentMode === 'knopky')      { flipThen(knopkyFlip,       showKnopky);      return; }
  if (currentMode === 'vpisyvanje')  { flipThen(vpisyvanjeFlip,   showVpisyvanje);  return; }
  showCard();
}

function prevCard() {
  if (deck.length === 0) return;
  index = (index - 1 + deck.length) % deck.length;
  knopkyOptions = null;
  knopkyAnswered = false;
  vpisyvanjeAnswered = false;
  if (currentMode === 'knopky')      { flipThen(knopkyFlip,       showKnopky);      return; }
  if (currentMode === 'vpisyvanje')  { flipThen(vpisyvanjeFlip,   showVpisyvanje);  return; }
  showCard();
}

card.addEventListener('click', flipCard);
btnYes.addEventListener('click', nextCard);
btnNo.addEventListener('click', function() {
  repeatQueue.push({ item: deck[index], remaining: 5 });
  nextCard();
});
btnBack.addEventListener('click', prevCard);

vpisyvanjeBtnBack.addEventListener('click', prevCard);
vpisyvanjeBtnCheck.addEventListener('click', checkVpisyvanje);
vpisyvanjeInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); checkVpisyvanje(); }
});

document.addEventListener('keydown', function(e) {
  if (document.activeElement === vpisyvanjeInput) return;
  if (currentMode === 'vpisyvanje' && e.key === 'Enter') { e.preventDefault(); checkVpisyvanje(); return; }
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight' || e.key === 'y') nextCard();
  if (e.key === 'ArrowLeft'  || e.key === 'p') prevCard();
  if (e.key === 'n') { if (!btnNo.disabled) { repeatQueue.push({ item: deck[index], remaining: 5 }); nextCard(); } }
});

var savedLang = localStorage.getItem('karticky_lang') || 'en';
var savedMode = localStorage.getItem('karticky_mode') || 'karticky';
setLang(savedLang);
if (savedMode !== 'karticky') switchMode(savedMode);
</script>
