<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Med&#x17E;uslovjanske karti&#x010D;ky</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --accent: #3a7bd5;
      --muted: #8892a4;
      --radius: 24px;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 24px;
      gap: 24px;
    }

    header { text-align: center; }
    header h1 {
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .lang-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .lang-btn {
      background: rgba(255,255,255,0.06);
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 1.45rem;
      line-height: 1;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .lang-btn span.code {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.12); }
    .lang-btn:active { transform: scale(0.93); }
    .lang-btn.active {
      border-color: var(--accent);
      background: rgba(58,123,213,0.15);
    }
    .lang-btn.active span.code { color: var(--accent); }

    .progress-bar {
      width: min(420px, 100%);
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .scene {
      width: min(420px, 100%);
      height: 240px;
      perspective: 1000px;
      cursor: pointer;
    }
    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
      border-radius: var(--radius);
    }
    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      padding: 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      user-select: none;
    }

    .label {
      position: absolute;
      top: 20px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .word {
      font-size: clamp(1.4rem, 5vw, 2.3rem);
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .word sup {
      font-size: 0.55em;
      vertical-align: super;
    }
    .word-sub {
      font-size: 0.48em;
      font-weight: 400;
      opacity: 0.65;
      line-height: 1.3;
    }

    .card-front { background: #eef4fb; color: #1a1a2e; }
    .card-front .label { color: var(--accent); }

    .card-back {
      background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
      color: #e8f4f8;
      transform: rotateY(180deg);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .card-back .label { color: #7ecfea; }

    .tap-hint {
      position: absolute;
      bottom: 22px;
      right: 28px;
      font-size: 2rem;
      pointer-events: none;
      opacity: 0;
      transform: rotate(180deg);
      transition: opacity 0.4s ease;
    }
    .tap-hint.visible {
      opacity: 1;
      animation: tapGesture 1.1s ease-in-out infinite;
    }
    @keyframes tapGesture {
      0%   { transform: rotate(180deg) translateY(0)    scale(1);    }
      35%  { transform: rotate(180deg) translateY(6px)  scale(0.88); }
      55%  { transform: rotate(180deg) translateY(6px)  scale(0.88); }
      80%  { transform: rotate(180deg) translateY(0)    scale(1);    }
      100% { transform: rotate(180deg) translateY(0)    scale(1);    }
    }

    .controls { display: flex; gap: 14px; align-items: center; justify-content: center; }
    .controls button {
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      border-radius: 999px;
      padding: 12px 22px;
      transition: transform 0.13s, box-shadow 0.13s, background 0.13s, opacity 0.13s;
    }
    .controls button:active { transform: scale(0.95); }

    button.btn-back {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.45);
    }
    button.btn-back:hover { background: rgba(255,255,255,0.16); }

    button.btn-no {
      background: rgba(220,80,80,0.25);
      color: rgba(255,160,160,0.9);
    }
    button.btn-no:hover:not(:disabled) { background: rgba(220,80,80,0.38); }
    button.btn-no:disabled {
      opacity: 0.3;
      cursor: default;
    }

    button.btn-yes {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 20px rgba(58,123,213,0.4);
    }
    button.btn-yes:hover { box-shadow: 0 6px 28px rgba(58,123,213,0.6); }

    .stats { color: var(--muted); font-size: 0.8rem; }

    /* Mode dropdown */
    .mode-dropdown {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 100;
    }
    .cat-dropdown {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 100;
    }
    .mode-toggle-btn, .cat-toggle-btn {
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .mode-toggle-btn:hover, .cat-toggle-btn:hover { background: rgba(255,255,255,0.14); }
    .mode-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: #16213e;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      overflow: hidden;
      min-width: 120px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .mode-menu.hidden { display: none; }
    .cat-menu {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: #16213e;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      overflow: hidden;
      min-width: 280px;
      max-height: 60vh;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .cat-menu.hidden { display: none; }
    .cat-menu-item {
      display: block;
      padding: 7px 12px;
      cursor: pointer;
      color: rgba(255,255,255,0.75);
      font-size: 0.78rem;
      transition: background 0.1s;
    }
    .cat-menu-item:hover { background: rgba(255,255,255,0.07); }
    .cat-menu-item.active { color: var(--accent); font-weight: 600; }
    .cat-menu-separator { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 2px 0; }
    .mode-menu-item {
      display: block;
      width: 100%;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.7);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 10px 16px;
      cursor: pointer;
      text-align: left;
      transition: background 0.12s;
    }
    .mode-menu-item:hover { background: rgba(255,255,255,0.08); }
    .mode-menu-item.active { color: var(--accent); }

    /* Section visibility */
    .game-section { display: contents; }
    .game-section.hidden { display: none; }

    /* Knopky section */
    .knopky-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(420px, 100%);
    }
    .knopky-section { perspective: 1000px; }
    .knopky-flip {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .knopky-word {
      background: #eef4fb;
      border-radius: 16px;
      padding: 8px 24px;
      width: 100%;
      height: 128px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      color: #1a1a2e;
    }
    .knopky-word .label {
      position: static;
      display: block;
      color: var(--accent);
      align-self: start;
      padding-top: 4px;
    }
    .knopky-main {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .knopky-main sup { font-size: 0.55em; vertical-align: super; }
    .knopky-sub {
      align-self: end;
      padding-bottom: 6px;
      font-size: 0.75rem;
      font-weight: 400;
      opacity: 0.65;
      line-height: 1.3;
      min-height: 1.2em;
    }
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }
    .option-btn {
      border: 2px solid transparent;
      border-radius: 16px;
      padding: 6px 10px;
      height: 72px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: clamp(0.8rem, 2.5vw, 0.95rem);
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 3px 12px rgba(58,123,213,0.35);
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      line-height: 1.3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .option-btn:hover:not([disabled]) { box-shadow: 0 4px 18px rgba(58,123,213,0.55); }
    .option-btn.correct {
      background: rgba(50,200,100,0.18);
      border-color: #32c864;
      color: #6effa0;
    }
    .option-btn.wrong {
      background: rgba(220,60,60,0.18);
      border-color: #dc3c3c;
      color: rgba(255,120,120,0.8);
      text-decoration: line-through;
    }
    .option-btn .word-sub {
      font-size: 0.72em;
      font-weight: 400;
      opacity: 0.8;
    }

    /* Vpisyvanje section */
    .vpisyvanje-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(420px, 100%);
      perspective: 1000px;
    }
    .vpisyvanje-flip {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .vpisyvanje-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-family: inherit;
      font-size: max(1.1rem, 16px);
      font-weight: 600;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      box-sizing: border-box;
    }
    .vpisyvanje-input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.12);
    }
    .vpisyvanje-input.correct {
      border-color: #32c864;
      background: rgba(50,200,100,0.12);
      color: #6effa0;
    }
    .vpisyvanje-input.wrong {
      border-color: #dc3c3c;
      background: rgba(220,60,60,0.12);
      color: rgba(255,120,120,0.9);
    }
    .vpisyvanje-input-wrap {
      position: relative;
      width: 100%;
    }
    .vpisyvanje-correct-overlay {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      text-align: center;
      border-radius: 12px;
      border: 2px solid #32c864;
      background: rgba(50,200,100,0.12);
      color: #6effa0;
      font-family: inherit;
      font-size: max(1.1rem, 16px);
      font-weight: 600;
      box-sizing: border-box;
      padding: 14px 18px;
    }
    .vpisyvanje-correct-overlay.visible { display: flex; }
    .vpisyvanje-correct-overlay sup { font-size: 0.6em; vertical-align: super; }
    .vpisyvanje-correct-overlay b { font-weight: 800; }
    .vpisyvanje-answer {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
      color: #6effa0;
      min-height: 1.4em;
    }
    .vpisyvanje-answer .word-sub {
      font-size: 0.8em;
      font-weight: 400;
      opacity: 0.8;
    }
    .vpisyvanje-answer sup { font-size: 0.6em; vertical-align: super; }
    .vpisyvanje-answer u { text-decoration-thickness: 2px; text-underline-offset: 3px; }

    /* Zmija section */
    .zmija-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(420px, 100%);
    }
    .zmija-section { perspective: 1000px; }
    .zmija-flip {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .zmija-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
      width: 100%;
    }
    .zmija-btn {
      aspect-ratio: 1;
      border: none;
      border-radius: 6px;
      background: rgba(58,123,213,0.22);
      color: rgba(255,255,255,0.75);
      font-family: inherit;
      font-size: clamp(0.65rem, 2.2vw, 0.85rem);
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.12s, color 0.12s, box-shadow 0.12s;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    .zmija-btn.zmija-start {
      background: rgba(255,200,50,0.75);
      color: #1a1a2e;
      box-shadow: 0 0 0 2px rgba(255,200,50,1);
    }
    .zmija-btn.zmija-selected {
      background: var(--accent);
      color: #fff;
    }
    .zmija-btn.zmija-correct {
      background: rgba(50,200,100,0.85);
      color: #1a1a2e;
    }
    .zmija-btn.zmija-other-0 { background: rgba(58,123,213,0.85);  color: #fff; }
    .zmija-btn.zmija-other-1 { background: rgba(220,130,0,0.85);   color: #1a1a2e; }
    .zmija-btn.zmija-other-2 { background: rgba(160,60,210,0.85);  color: #fff; }
    .zmija-btn.zmija-other-3 { background: rgba(0,185,195,0.85);   color: #1a1a2e; }
    .zmija-btn.zmija-other-4 { background: rgba(210,70,140,0.85);  color: #fff; }
    .zmija-btn.zmija-wrong { background: rgba(220,60,60,0.85) !important; color: #fff !important; }
    .zmija-grid { position: relative; }
    .zmija-grid.zmija-unselected .zmija-btn:not([data-row="0"]):not([data-col="0"]) { opacity: 0.3; }
    .zmija-arrow {
      position: absolute;
      transform: translate(-50%, -50%);
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 3px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.6);
      pointer-events: none;
      z-index: 2;
      line-height: 1;
    }
  </style>
</head>
<body>

<header>
  <h1>Med&#x17E;uslovjanske karti&#x010D;ky</h1>
</header>

<div class="mode-dropdown" id="modeDropdown">
  <button class="mode-toggle-btn" id="modeToggle">Karti&#x010D;ky &#x25BE;</button>
  <div class="mode-menu hidden" id="modeMenu">
    <button class="mode-menu-item active" data-mode="karticky">Karti&#x010D;ky</button>
    <button class="mode-menu-item"        data-mode="knopky">Knopky</button>
    <button class="mode-menu-item"        data-mode="vpisyvanje">Vpisyvanje</button>
    <button class="mode-menu-item"        data-mode="zmija">Zmija</button>
  </div>
</div>

<div class="cat-dropdown" id="catDropdown">
  <button class="cat-toggle-btn" id="catToggle">&#x25BE;</button>
  <div class="cat-menu hidden" id="catMenu">
    <div id="catList"></div>
  </div>
</div>

<div class="lang-selector" id="langSelector"></div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="game-section" id="kartickySect">
  <div class="scene">
    <div class="card" id="card">
      <div class="card-face card-front">
        <span class="label" id="frontLabel"></span>
        <span class="word" id="wordFront"></span>
        <span class="tap-hint" id="tapHint">&#x1F447;</span>
      </div>
      <div class="card-face card-back">
        <span class="label">Med&#x17E;uslovjansky</span>
        <span class="word" id="wordIsv"></span>
      </div>
    </div>
  </div>
  <div class="controls">
    <button class="btn-back" id="btnBack">&#x2190; Vrati</button>
    <button class="btn-no"   id="btnNo"   disabled>Ne znam &#x2192;</button>
    <button class="btn-yes"  id="btnYes">Znam &#x2192;</button>
  </div>
</div>

<div class="game-section hidden knopky-section" id="knopkySect">
  <div class="knopky-flip" id="knopkyFlip">
    <div class="knopky-word" id="knopkyWord">
      <span class="label" id="knopkyLabel"></span>
      <div class="knopky-main" id="knopkyWordMain"></div>
      <div class="knopky-sub"  id="knopkyWordSub"></div>
    </div>
    <div class="options-grid" id="optionsGrid"></div>
  </div>
</div>

<div class="game-section hidden vpisyvanje-section" id="vpisyvanjeSect">
  <div class="vpisyvanje-flip" id="vpisyvanjeFlip">
    <div class="knopky-word" id="vpisyvanjeWord">
      <span class="label" id="vpisyvanjeLabel"></span>
      <div class="knopky-main" id="vpisyvanjeWordMain"></div>
      <div class="knopky-sub"  id="vpisyvanjeWordSub"></div>
    </div>
    <div class="vpisyvanje-input-wrap">
      <input type="text" class="vpisyvanje-input" id="vpisyvanjeInput" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
      <div class="vpisyvanje-correct-overlay" id="vpisyvanjeCorrectOverlay"></div>
    </div>
    <div class="vpisyvanje-answer" id="vpisyvanjeAnswer"></div>
    <div class="controls">
      <button class="btn-back" id="vpisyvanjeBtnBack">&#x2190; Vrati</button>
      <button class="btn-yes"  id="vpisyvanjeBtnCheck">Prověri &#x2192;</button>
    </div>
  </div>
</div>

<div class="game-section hidden zmija-section" id="zmijaSect">
  <div class="zmija-flip" id="zmijaFlip">
    <div class="knopky-word" id="zmijaWord">
      <span class="label" id="zmijaLabel"></span>
      <div class="knopky-main" id="zmijaWordMain"></div>
      <div class="knopky-sub"  id="zmijaWordSub"></div>
    </div>
    <div class="zmija-grid" id="zmijaGrid"></div>
    <div class="controls">
      <button class="btn-back" id="zmijaBtnBack">&#x2190; Vrati</button>
      <button class="btn-no"   id="zmijaBtnNoAfter" style="display:none">Ne znam &#x2192;</button>
      <button class="btn-yes"  id="zmijaBtnSkip">Ne znam &#x2192;</button>
    </div>
  </div>
</div>

<div class="stats" id="stats"></div>

<script src="vocab.js"></script>
<script src="categories.js"></script>
<script>

function playCorrect() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var t = ctx.currentTime;
    [440, 587].forEach(function(freq, i) {
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.value = freq;
      var s = t + i * 0.08;
      g.gain.setValueAtTime(0, s);
      g.gain.linearRampToValueAtTime(0.22, s + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, s + 0.18);
      o.start(s); o.stop(s + 0.18);
    });
  } catch(e) {}
}

function playWrong() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var t = ctx.currentTime;
    [330, 247].forEach(function(freq, i) {
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.value = freq;
      var s = t + i * 0.1;
      g.gain.setValueAtTime(0, s);
      g.gain.linearRampToValueAtTime(0.22, s + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, s + 0.18);
      o.start(s); o.stop(s + 0.18);
    });
  } catch(e) {}
}

const LANGS = [
  { code: 'pl', flag: '\uD83C\uDDF5\uD83C\uDDF1', label: 'Polski' },
  { code: 'cz', flag: '\uD83C\uDDE8\uD83C\uDDFF', label: '\u010Cesky' },

var ABBR = [
  [/\(impf\.\)/g,  '(imperfective)'],
  [/\(pf\.\)/g,    '(perfective)'],
  [/\(indet\.\)/g, '(without direction)'],
  [/\(fem\.\)/g,   '(feminine)'],
  [/\(neut\.\)/g,  '(neuter)'],
  [/\(pers\.\)/g,  '(person)'],
  [/\(veh\.\)/g,   '(vehicle)'],
  [/\(n\.\)/g,     '(noun)'],
  [/\(v\.\)/g,     '(verb)'],
  [/\(sg\.\)/g,    '(singular)'],
  [/\(pl\.\)/g,    '(plural)'],
  [/\(f\.\)/g,     '(feminine)'],
  [/\(m\.\)/g,     '(masculine)'],
];
function expandAbbreviations(s) {
  ABBR.forEach(function(pair) { s = s.replace(pair[0], pair[1]); });
  return s;
}

function formatWord(html) {
  var idx = html.indexOf('(');
  if (idx <= 0) return '<span>' + html + '</span>';
  var main = html.substring(0, idx).trim();
  var sub  = expandAbbreviations(html.substring(idx));
  return '<span>' + main + '</span><span class="word-sub">' + sub + '</span>';
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function filterVocab() {
  return VOCAB.filter(function(w) {
    return w[currentLang] && w[currentLang].trim() !== '' && (!selectedCat || w.cat === selectedCat);
  });
}

function rebuildDeck() {
  var currentItem = deck[index] || null;
  deck = shuffle(filterVocab());

  knopkyNextAction = null;

  // Generate options only when word changes (knopkyOptions === null)
  if (!knopkyOptions) {
    var correct = item.isv;
    var pool = shuffle(VOCAB.filter(function(w) { return w.isv && w.isv !== correct; }));
    var wrongs = pool.slice(0, 3).map(function(w) { return w.isv; });

function handleOptionClick(clickedBtn, isCorrect) {
  if (knopkyAnswered) return;
  knopkyAnswered = true;

  var myGen = knopkyGeneration;

  var allBtns = optionsGrid.querySelectorAll('.option-btn');
  allBtns.forEach(function(b) { b.disabled = true; });

  if (isCorrect) {
    playCorrect();
    clickedBtn.classList.add('correct');
    knopkyNextAction = function() { nextCard(); };
  } else {
    playWrong();
    clickedBtn.classList.add('wrong');
    allBtns.forEach(function(b) {
      if (b.dataset.correct === 'true') b.classList.add('correct');
    });
    knopkyNextAction = function() {
      repeatQueue.push({ item: deck[index], remaining: 5 });
      nextCard();
    };
  }

  function advance() {
    if (knopkyGeneration !== myGen) return;
    clearTimeout(knopkyAutoTimer);
    if (knopkyNextAction) { var fn = knopkyNextAction; knopkyNextAction = null; fn(); }
  }

  setTimeout(function() {
    allBtns.forEach(function(b) {
      if (b.dataset.correct === 'true') {
        b.disabled = false;
        b.addEventListener('click', advance, { once: true });
      }
    });
    document.addEventListener('click', function handler(e) {
      document.removeEventListener('click', handler);
      if (currentMode !== 'knopky') return;
      if (e.target.closest('.lang-selector, .mode-dropdown, .cat-dropdown')) return;
      advance();
    });
  }, 400);
}

var FLIP_MS = 260;

function flipThen(el, fn) {
  el.style.transition = 'transform ' + FLIP_MS + 'ms cubic-bezier(0.4,0.2,0.2,1)';
  el.style.transform  = 'rotateY(90deg)';

    el.style.transition = 'transform ' + FLIP_MS + 'ms cubic-bezier(0.4,0.2,0.2,1)';
    el.style.transform  = 'rotateY(0deg)';
    setTimeout(function() { el.style.transition = el.style.transform = ''; }, FLIP_MS);
  }, FLIP_MS);
}

function normalize(s) {
  return s.replace(/<sup>[^<]*<\/sup>/gi, '')  // remove superscripts (incl. content)
           .replace(/<[^>]*>/g, '')              // strip remaining HTML tags
           .replace(/[\s,.!?;:()\[\]{}]/g, '')  // strip punctuation/spaces/brackets
           .toLowerCase()
           .replace(/cz/g, 'č')                 // allow cz as substitute for č
           .replace(/sz/g, 'š')                 // allow sz as substitute for š
           .replace(/ĉ/g, 'č')                  // allow ĉ as substitute for č
           .replace(/ć/g, 'č')                  // allow ć as substitute for č
           .replace(/[êèé]/g, 'ě')              // allow ê/è/é as substitute for ě
           .replace(/ŝ/g, 'š')                  // allow ŝ as substitute for š
           .replace(/ś/g, 'š');                 // allow ś as substitute for š
}

// Split on ',' and '? ' only at top level (not inside parentheses)
function splitTopLevel(s) {
  var parts = [], depth = 0, start = 0;
  for (var i = 0; i < s.length; i++) {
    if (s[i] === '(') depth++;
    else if (s[i] === ')') depth--;
    else if (depth === 0) {
      if (s[i] === ',') { parts.push(s.substring(start, i)); start = i + 1; }
      else if (s[i] === '?' && i + 1 < s.length && s[i + 1] === ' ') {
        parts.push(s.substring(start, i + 1)); start = i + 2; i++;
      }
    }
  }
  parts.push(s.substring(start));
  return parts;
}

// Expand attached parens into two variants: "(po)zvoniti" → ["pozvoniti","zvoniti"]
function expandOptionalParens(s) {
  for (var i = 0; i < s.length; i++) {
    if (s[i] === '(' && (i === 0 || s[i - 1] !== ' ')) {
      var close = s.indexOf(')', i);
      if (close < 0) break;
      var before = s.substring(0, i);
      var inside = s.substring(i + 1, close);
      var after  = s.substring(close + 1);
      var result = [];
      expandOptionalParens(before + inside + after).forEach(function(v) { result.push(v); });
      expandOptionalParens(before + after).forEach(function(v) { if (result.indexOf(v) < 0) result.push(v); });
      return result;
    }
  }
  return [s];
}

function checkVpisyvanje() {

    .replace(/<sup>[^<]*<\/sup>/gi, '').replace(/<[^>]*>/g, '')
    .replace(/\s+\([^)]*\)/g, '');  // strip explanatory parens (space-separated)
  var userNorm = normalize(vpisyvanjeInput.value);
  var matchedIdx = -1;
  isvClean.split(/,|\?\s+/).some(function(v, i) {
    if (expandOptionalParens(v.trim()).some(function(exp) { return normalize(exp) === userNorm; })) {
      matchedIdx = i;

  var isCorrect = matchedIdx >= 0;

      repeatQueue.push({ item: deck[index], remaining: 5 });
      nextCard();
    };
  }
}

var MOVES_LEFT = [{dr: -1, dc: 0}, {dr: 1, dc: 0}, {dr: 0, dc: 1}];  // up, down, right
var MOVES_TOP  = [{dr: 1, dc: 0}, {dr: 0, dc: -1}, {dr: 0, dc: 1}];  // down, left, right

function dfsSnake(path, occupied, len, moveDefs) {
  if (path.length === len) return true;
  var cur = path[path.length - 1];
  var candidates = shuffle(moveDefs.map(function(m) {
    return {row: cur.row + m.dr, col: cur.col + m.dc};
  }));
  for (var i = 0; i < candidates.length; i++) {
    var nr = candidates[i].row, nc = candidates[i].col;
    if (nr < 0 || nr >= 5 || nc < 0 || nc >= 10 || occupied[nr][nc]) continue;
    occupied[nr][nc] = true;
    path.push({row: nr, col: nc});
    if (dfsSnake(path, occupied, len, moveDefs)) return true;
    path.pop();
    occupied[nr][nc] = false;
  }
  return false;
}

// Place variant snakes starting from left column (→) or top row (↓), shared occupied grid
function placeAllSnakes(words) {
  var occupied = [];
  for (var r = 0; r < 5; r++) { occupied[r] = []; for (var c = 0; c < 10; c++) occupied[r][c] = false; }
  var result = [];
  var starts = [];
  for (var r = 0; r < 5; r++) starts.push({row: r, col: 0, entryType: 'left', moves: MOVES_LEFT});
  for (var c = 1; c < 10; c++) starts.push({row: 0, col: c, entryType: 'top',  moves: MOVES_TOP});
  starts = shuffle(starts);
  var usedStarts = {};
  for (var w = 0; w < words.length; w++) {
    var word = words[w];
    for (var si = 0; si < starts.length; si++) {
      var s = starts[si];
      var key = s.row + ',' + s.col;
      if (usedStarts[key] || occupied[s.row][s.col]) continue;
      occupied[s.row][s.col] = true;
      var path = [{row: s.row, col: s.col}];
      if (dfsSnake(path, occupied, word.length, s.moves)) {
        result.push({path: path, word: word, entryType: s.entryType});
        usedStarts[key] = true;
        break;
      }
      occupied[s.row][s.col] = false;
    }
  }
  return result;
}

function zmijaExtractVariants(item) {
  var html = item.isv
    .replace(/<sup>[^<]*<\/sup>/gi, '')
    .replace(/<[^>]*>/g, '');
  var seen = {};
  return splitTopLevel(html)
    .map(function(v) {
      return v.replace(/\([^)]*\)/g, '')
               .replace(/[^a-z\u010d\u0161\u017e\u011b]/gi, '')
               .toLowerCase();
    })
    .filter(function(v) {
      if (!v || seen[v]) return false;
      seen[v] = true; return true;
    })
    .slice(0, 5);
}

function showZmija() {
  if (deck.length === 0) return;
  var item = deck[index];

  zmijaLabel.textContent = catLabel(item.cat);
  var langWord = item[currentLang] || '';
  var parenIdx = langWord.indexOf('(');
  if (parenIdx <= 0) { zmijaWordMain.innerHTML = langWord; zmijaWordSub.innerHTML = ''; }
  else { zmijaWordMain.innerHTML = langWord.substring(0, parenIdx).trim(); zmijaWordSub.innerHTML = expandAbbreviations(langWord.substring(parenIdx)); }

  if (item.num === zmijaCurrentNum) return; // grid already set for this word
  zmijaCurrentNum = item.num;
  zmijaAnswered = false;
  zmijaCompleted = false;
  zmijaNextAction = null;
  zmijaSelected = 0;
  zmijaActiveVariant = -1;
  zmijaBtnSkip.textContent = 'Ne znam \u2192';
  zmijaBtnSkip.style.cssText = '';
  zmijaBtnNoAfter.style.display = 'none';

  var words = zmijaExtractVariants(item);
  if (!words.length) { nextCard(); return; }

  zmijaGridData = [];
  for (var r = 0; r < 5; r++) { zmijaGridData[r] = []; for (var c = 0; c < 10; c++) zmijaGridData[r][c] = null; }

  var placed = placeAllSnakes(words);
  if (!placed.length) { nextCard(); return; }
  zmijaVariants = placed;
  for (var vi = 0; vi < placed.length; vi++)
    for (var i = 0; i < placed[vi].path.length; i++)
      zmijaGridData[placed[vi].path[i].row][placed[vi].path[i].col] = placed[vi].word[i];
  for (var r = 0; r < 5; r++)
    for (var c = 0; c < 10; c++)
      if (zmijaGridData[r][c] === null)
        zmijaGridData[r][c] = ISV_ALPHA[Math.floor(Math.random() * ISV_ALPHA.length)];

  stats.textContent    = '#' + item.num;
  progFill.style.width = Math.min(checkedCount / 50 * 100, 100).toFixed(1) + '%';

  renderZmijaGrid();
}

function renderZmijaGrid() {
  zmijaGridEl.innerHTML = '';
  for (var r = 0; r < 5; r++) {
    for (var c = 0; c < 10; c++) {
      var btn = document.createElement('button');
      btn.textContent   = zmijaGridData[r][c];
      btn.dataset.row   = r;
      btn.dataset.col   = c;
      btn.className     = 'zmija-btn';
      btn.addEventListener('click', handleZmijaClick);
      zmijaGridEl.appendChild(btn);
    }
  }
  zmijaGridEl.classList.add('zmija-unselected');
}

function getZmijaBtn(row, col) {
  return zmijaGridEl.querySelector('.zmija-btn[data-row="' + row + '"][data-col="' + col + '"]');
}

function updateZmijaHighlights() {
  zmijaGridEl.querySelectorAll('.zmija-btn').forEach(function(b) { b.className = 'zmija-btn'; });
  zmijaGridEl.querySelectorAll('.zmija-arrow').forEach(function(el) { el.remove(); });
  zmijaGridEl.classList.toggle('zmija-unselected', !zmijaAnswered && zmijaActiveVariant < 0);
  if (zmijaAnswered) {
    var otherIdx = 0;
    zmijaVariants.forEach(function(variant, vi) {
      var cls = (zmijaCompleted && vi === zmijaActiveVariant)
        ? 'zmija-correct'
        : 'zmija-other-' + (otherIdx++);
      variant.path.forEach(function(p) { getZmijaBtn(p.row, p.col).classList.add(cls); });
    });
    addZmijaArrows();
    return;
  }
  if (zmijaActiveVariant >= 0) {
    var path = zmijaVariants[zmijaActiveVariant].path;
    for (var i = 0; i < zmijaSelected; i++)
      getZmijaBtn(path[i].row, path[i].col).classList.add('zmija-selected');
    if (zmijaSelected > 1)
      addPathArrows(path, 0, zmijaSelected - 1);
  }
}

function addPathArrows(path, fromIdx, toIdx) {
  var gridRect = zmijaGridEl.getBoundingClientRect();
  for (var i = fromIdx; i < toIdx; i++) {
    var a = getZmijaBtn(path[i].row,   path[i].col);
    var b = getZmijaBtn(path[i+1].row, path[i+1].col);
    var ra = a.getBoundingClientRect();
    var rb = b.getBoundingClientRect();
    var mx = ((ra.left+ra.right)/2 + (rb.left+rb.right)/2) / 2 - gridRect.left;
    var my = ((ra.top+ra.bottom)/2 + (rb.top+rb.bottom)/2) / 2 - gridRect.top;
    var p = path[i], n = path[i+1];
    var ch = n.col > p.col ? '\u2192' : (n.col < p.col ? '\u2190' : (n.row < p.row ? '\u2191' : '\u2193'));
    var el = document.createElement('span');
    el.className = 'zmija-arrow';
    el.textContent = ch;
    el.style.left = mx + 'px';
    el.style.top  = my + 'px';
    zmijaGridEl.appendChild(el);
  }
}

function addZmijaArrows() {
  zmijaVariants.forEach(function(variant) {
    addPathArrows(variant.path, 0, variant.path.length - 1);
  });
}


function handleZmijaClick(e) {
  if (zmijaAnswered) return;
  var btn = e.currentTarget;
  var row = parseInt(btn.dataset.row);
  var col = parseInt(btn.dataset.col);

  // No variant chosen yet — check if this cell starts any variant
  if (zmijaActiveVariant < 0) {
    for (var vi = 0; vi < zmijaVariants.length; vi++) {
      var s = zmijaVariants[vi].path[0];
      if (s.row === row && s.col === col) {
        zmijaActiveVariant = vi;
        zmijaSelected = 1;
        updateZmijaHighlights();
        return;
      }
    }
    playWrong();
    btn.classList.add('zmija-wrong');
    setTimeout(function() { btn.classList.remove('zmija-wrong'); }, 100);
    return;
  }

  var path = zmijaVariants[zmijaActiveVariant].path;

  // Unclick last selected cell (or first, resetting variant choice)
  if (zmijaSelected > 0 && path[zmijaSelected - 1].row === row && path[zmijaSelected - 1].col === col) {
    zmijaSelected--;
    if (zmijaSelected === 0) zmijaActiveVariant = -1;
    updateZmijaHighlights();
    return;
  }

  // Advance if this is the expected next cell, otherwise flash red
  if (zmijaSelected < path.length) {
    var expected = path[zmijaSelected];
    if (expected.row !== row || expected.col !== col) {
      playWrong();
      btn.classList.add('zmija-wrong');
      setTimeout(function() { btn.classList.remove('zmija-wrong'); }, 100);
      return;
    }
    zmijaSelected++;
    if (zmijaSelected === path.length) {
      playCorrect();
      zmijaAnswered = true;
      zmijaCompleted = true;
      checkedCount++;
      progFill.style.width = Math.min(checkedCount / 50 * 100, 100).toFixed(1) + '%';
      zmijaBtnSkip.textContent = 'Znam \u2192';
      zmijaBtnSkip.style.background = 'rgba(50,200,100,0.3)';
      zmijaBtnSkip.style.boxShadow  = 'none';
      zmijaBtnNoAfter.style.display = '';
      zmijaNextAction = function() { nextCard(); };
    }
    updateZmijaHighlights();
  }
}

zmijaBtnBack.addEventListener('click', prevCard);
zmijaBtnSkip.addEventListener('click', function() {
  if (zmijaNextAction) { var fn = zmijaNextAction; zmijaNextAction = null; fn(); return; }
  if (!zmijaAnswered) {
    zmijaAnswered = true;
    updateZmijaHighlights();
    zmijaBtnSkip.textContent = 'Ne znam \u2192';
    zmijaBtnSkip.style.background = 'rgba(220,80,80,0.25)';
    zmijaBtnSkip.style.color      = 'rgba(255,160,160,0.9)';
    zmijaBtnSkip.style.boxShadow  = 'none';
    zmijaNextAction = function() { repeatQueue.push({ item: deck[index], remaining: 5 }); nextCard(); };
  }
});

zmijaBtnNoAfter.addEventListener('click', function() {
  repeatQueue.push({ item: deck[index], remaining: 5 });
  nextCard();
});

// --- end Zmija ---

function flipCard() {
  clearTimeout(hintTimer);
  tapHint.classList.remove('visible');
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
  if (flipped) { flipCount++; btnNo.disabled = false; }
}

function nextCard() {
  if (deck.length === 0) return;
  checkedCount++;
  index = (index + 1) % deck.length;
  if (index === 0) deck = shuffle(filterVocab());
  // Decrement repeat countdowns and inject any due items right after current position
  var due = [];
  repeatQueue = repeatQueue.filter(function(r) {
    r.remaining--;
    if (r.remaining <= 0) { due.push(r.item); return false; }
    return true;
  });
  due.forEach(function(item, i) {
    deck.splice(index + 1 + i, 0, item);
  });
  knopkyOptions = null;
  knopkyAnswered = false;
  vpisyvanjeAnswered = false;
  zmijaCurrentNum = null; zmijaActiveVariant = -1;
  if (currentMode === 'knopky')      { flipThen(knopkyFlip,     showKnopky);     return; }
  if (currentMode === 'vpisyvanje')  { flipThen(vpisyvanjeFlip, showVpisyvanje); return; }
  if (currentMode === 'zmija')       { flipThen(zmijaFlip,      showZmija);      return; }
  showCard();
}

function prevCard() {
  if (deck.length === 0) return;
  index = (index - 1 + deck.length) % deck.length;
  knopkyOptions = null;
  knopkyAnswered = false;
  vpisyvanjeAnswered = false;
  zmijaCurrentNum = null; zmijaActiveVariant = -1;
  if (currentMode === 'knopky')      { flipThen(knopkyFlip,     showKnopky);     return; }
  if (currentMode === 'vpisyvanje')  { flipThen(vpisyvanjeFlip, showVpisyvanje); return; }
  if (currentMode === 'zmija')       { flipThen(zmijaFlip,      showZmija);      return; }
  showCard();
}

card.addEventListener('click', flipCard);
btnYes.addEventListener('click', nextCard);
btnNo.addEventListener('click', function() {
  repeatQueue.push({ item: deck[index], remaining: 5 });
  nextCard();
});
btnBack.addEventListener('click', prevCard);

vpisyvanjeBtnBack.addEventListener('click', prevCard);
vpisyvanjeBtnCheck.addEventListener('click', checkVpisyvanje);
vpisyvanjeInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); checkVpisyvanje(); }
});

document.addEventListener('keydown', function(e) {
  if (document.activeElement === vpisyvanjeInput) return;
  if (currentMode === 'vpisyvanje' && e.key === 'Enter') { e.preventDefault(); checkVpisyvanje(); return; }
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight' || e.key === 'y') nextCard();
  if (e.key === 'ArrowLeft'  || e.key === 'p') prevCard();
  if (e.key === 'n') { if (!btnNo.disabled) { repeatQueue.push({ item: deck[index], remaining: 5 }); nextCard(); } }
});

var savedLang = localStorage.getItem('karticky_lang') || 'en';
var savedMode = localStorage.getItem('karticky_mode') || 'karticky';
setLang(savedLang);
if (savedMode !== 'karticky') switchMode(savedMode);

(function() {
  var params = new URLSearchParams(window.location.search);
  var wordParam = params.get('word');
  var numParam  = params.get('num');
  var entry = null;
  if (numParam) {
    var n = parseInt(numParam);
    entry = VOCAB.find(function(w) { return w.num === n; }) || null;
  } else if (wordParam) {
    var q = wordParam.toLowerCase();
    entry = VOCAB.find(function(w) { return w.en && w.en.toLowerCase() === q; }) ||
            VOCAB.find(function(w) { return w.en && w.en.toLowerCase().indexOf(q) >= 0; }) || null;
  }
  if (entry) {
    deck = deck.filter(function(w) { return w.num !== entry.num; });
    deck.unshift(entry);
    index = 0;
    knopkyOptions = null;
    knopkyAnswered = false;
    vpisyvanjeAnswered = false;
    zmijaCurrentNum = null;
    showCurrent();
  }
})();
</script>
