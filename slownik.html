<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Vocabulary &#x2194; ISV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --accent: #3a7bd5;
      --muted: #8892a4;
      --radius: 24px;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 24px;
      gap: 24px;
    }

    header { text-align: center; }
    header h1 {
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .lang-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .lang-btn {
      background: rgba(255,255,255,0.06);
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 1.45rem;
      line-height: 1;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .lang-btn span.code {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.12); }
    .lang-btn:active { transform: scale(0.93); }
    .lang-btn.active {
      border-color: var(--accent);
      background: rgba(58,123,213,0.15);
    }
    .lang-btn.active span.code { color: var(--accent); }

    .progress-bar {
      width: min(420px, 100%);
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .scene {
      width: min(420px, 100%);
      height: 240px;
      perspective: 1000px;
      cursor: pointer;
    }
    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
      border-radius: var(--radius);
    }
    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      padding: 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      user-select: none;
    }

    .label {
      position: absolute;
      top: 20px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .word {
      font-size: clamp(1.4rem, 5vw, 2.3rem);
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
    }
    .word sup {
      font-size: 0.55em;
      vertical-align: super;
    }

    .card-front { background: #eef4fb; color: #1a1a2e; }
    .card-front .label { color: var(--accent); }

    .card-back {
      background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
      color: #e8f4f8;
      transform: rotateY(180deg);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .card-back .label { color: #7ecfea; }

    .tap-hint {
      position: absolute;
      bottom: 22px;
      right: 28px;
      font-size: 2rem;
      pointer-events: none;
      opacity: 0;
      transform: rotate(180deg);
      transition: opacity 0.4s ease;
    }
    .tap-hint.visible {
      opacity: 1;
      animation: tapGesture 1.1s ease-in-out infinite;
    }
    @keyframes tapGesture {
      0%   { transform: rotate(180deg) translateY(0)    scale(1);    }
      35%  { transform: rotate(180deg) translateY(6px)  scale(0.88); }
      55%  { transform: rotate(180deg) translateY(6px)  scale(0.88); }
      80%  { transform: rotate(180deg) translateY(0)    scale(1);    }
      100% { transform: rotate(180deg) translateY(0)    scale(1);    }
    }

    .controls { display: flex; gap: 14px; align-items: center; }
    button.btn-next {
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      border-radius: 999px;
      padding: 12px 30px;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 20px rgba(58,123,213,0.4);
      transition: transform 0.13s, box-shadow 0.13s;
    }
    button.btn-next:hover { box-shadow: 0 6px 28px rgba(58,123,213,0.6); }
    button.btn-next:active { transform: scale(0.95); }

    button.btn-prev {
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      border-radius: 999px;
      padding: 12px 30px;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.45);
      transition: transform 0.13s, background 0.13s;
    }
    button.btn-prev:hover { background: rgba(255,255,255,0.16); }
    button.btn-prev:active { transform: scale(0.95); }

    .stats { color: var(--muted); font-size: 0.8rem; }
  </style>
</head>

</header>

</div>

<div class="controls">

</div>

<div class="stats" id="stats"></div>

const LANGS = [
  { code: 'pl', flag: '\uD83C\uDDF5\uD83C\uDDF1', label: 'Polski' },
  { code: 'cz', flag: '\uD83C\uDDE8\uD83C\uDDFF', label: '\u010Cesky' },
  { code: 'sk', flag: '\uD83C\uDDF8\uD83C\uDDF0', label: 'Slovensky' },
  { code: 'uk', flag: '\uD83C\uDDFA\uD83C\uDDE6', label: '\u0423\u043A\u0440\u0430\u0457\u043D\u0441\u044C\u043A\u0430' },
  { code: 'ru', flag: '\uD83C\uDDF7\uD83C\uDDFA', label: '\u0420\u0443\u0441\u0441\u043A\u0438\u0439' },
  { code: 'cr', flag: '\uD83C\uDDED\uD83C\uDDF7', label: 'Hrvatski' },
  { code: 'en', flag: '\uD83C\uDDEC\uD83C\uDDE7', label: 'English' },
  { code: 'de', flag: '\uD83C\uDDE9\uD83C\uDDEA', label: 'Deutsch' }
];

var currentLang = 'en';
var deck = [];
var index = 0;
var flipped = false;

var card      = document.getElementById('card');
var wordFront = document.getElementById('wordFront');
var wordIsv   = document.getElementById('wordIsv');
var frontLabel= document.getElementById('frontLabel');
var btnNext   = document.getElementById('btnNext');
var btnPrev   = document.getElementById('btnPrev');
var stats     = document.getElementById('stats');
var progFill  = document.getElementById('progressFill');
var tapHint   = document.getElementById('tapHint');
var selector  = document.getElementById('langSelector');
var hintTimer = null;

LANGS.forEach(function(lang) {
  var btn = document.createElement('button');
  btn.className = 'lang-btn' + (lang.code === currentLang ? ' active' : '');
  btn.dataset.code = lang.code;
  btn.title = lang.label;
  btn.innerHTML = '<span class="flag">' + lang.flag + '</span><span class="code">' + lang.code.toUpperCase() + '</span>';
  btn.addEventListener('click', function() { setLang(lang.code); });
  selector.appendChild(btn);
});

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function setLang(code) {
  var currentItem = deck[index] || null;
  currentLang = code;
  selector.querySelectorAll('.lang-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.code === code);
  });
  var lang = LANGS.find(function(l) { return l.code === code; });
  frontLabel.textContent = lang ? lang.label : code.toUpperCase();
  deck = shuffle(VOCAB.filter(function(w) { return w[code] && w[code].trim() !== ''; }));
  var found = currentItem ? deck.indexOf(currentItem) : -1;
  index = found >= 0 ? found : 0;
  showCard();
}

function scheduleHint() {
  clearTimeout(hintTimer);
  tapHint.classList.remove('visible');
  if (!flipped) {
    hintTimer = setTimeout(function() { tapHint.classList.add('visible'); }, 10000);
  }
}

function showCard() {
  if (deck.length === 0) {
    wordFront.innerHTML = '(no data)';
    wordIsv.innerHTML = '';
    stats.textContent = '0 / 0';
    progFill.style.width = '0%';
    return;
  }
  var item = deck[index];
  wordFront.innerHTML = item[currentLang];
  wordIsv.innerHTML   = item.isv;
  card.style.transition = 'none';
  card.classList.remove('flipped');
  flipped = false;
  void card.offsetWidth;
  card.style.transition = '';
  var seen  = index + 1;
  var total = deck.length;
  stats.textContent    = seen + ' / ' + total;
  progFill.style.width = (seen / total * 100).toFixed(1) + '%';
  scheduleHint();
}

function flipCard() {
  clearTimeout(hintTimer);
  tapHint.classList.remove('visible');
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
}

function nextCard() {
  if (deck.length === 0) return;
  index = (index + 1) % deck.length;
  if (index === 0) deck = shuffle(VOCAB.filter(function(w) { return w[currentLang] && w[currentLang].trim() !== ''; }));
  showCard();
}

function prevCard() {
  if (deck.length === 0) return;
  index = (index - 1 + deck.length) % deck.length;
  showCard();
}

card.addEventListener('click', flipCard);
btnNext.addEventListener('click', nextCard);
btnPrev.addEventListener('click', prevCard);

document.addEventListener('keydown', function(e) {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight' || e.key === 'n') nextCard();
  if (e.key === 'ArrowLeft' || e.key === 'p') prevCard();
});

setLang('en');
</script>
</body>
</html>
